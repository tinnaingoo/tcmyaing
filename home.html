<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .container {
            padding: 5px;
        }

        .row::after {
            content: "";
            clear: both;
            display: table;
        }

        [class*="col-"] {
            float: left;
            padding: 1px;
        }

        /* For mobile phones: */
        [class*="col-"] {
            width: 100%;
        }

        @media only screen and (min-width: 768px) {
            /* For desktop: */
            .col-1 {width: 8.33%;}
            .col-2 {width: 16.66%;}
            .col-3 {width: 25%;}
            .col-4 {width: 33.33%;}
            .col-5 {width: 41.66%;}
            .col-6 {width: 50%;}
            .col-7 {width: 58.33%;}
            .col-8 {width: 66.66%;}
            .col-9 {width: 75%;}
            .col-10 {width: 83.33%;}
            .col-11 {width: 91.66%;}
            .col-12 {width: 100%;}
        }

        .header {
            background-color: #9933cc;
            color: #ffffff;
            text-align: center;
            padding: 15px;
        }



        .posts-section {
            padding: 20px;
        }

        .post img {
            width: 50px;
            height: 50px;
        }
        

        .footer {
            background-color: #0099cc;
            color: #ffffff;
            text-align: center;
            font-size: 12px;
            padding: 15px;
        }
    </style>
<!---for menu bar-->
    <style>
      * {
  padding: 0px;
  margin: 0px;
  transition: 0.5 s;
  font-family: Verdana, Geneva, Tahoma, sans-serif;
}
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0px 30px;
  background-color: #333;
  color: white;
  height: 8vh;
}
nav .links {
  display: flex;
}
.links p {
  padding: 10px;
}
#mobile-menu-btn {
  display: none;
}
.mobile-menu {
  color: white;
  display: none;
  position: absolute;
  right: 0;
  height: 60vh;
  width: 70vw;
  background-color: #333;
}

.user-section {
            float: right;
            padding: 14px 16px;
            color: white;
            display: flex;
            align-items: center;
}

span#loggedInUser {
    margin-left: 5px;
    font-size: 12px;
    font-family: monospace;
}
        
.logo .user-section button {
    margin-left: 5px;
    padding: 2px;
    color: red;
    border: black;
    text-align: center;
    font-family: math;
}        

@media (max-width: 600px) {
  #mobile-menu-btn {
    display: block;
  }
  nav p {
    display: none;
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
  }
}

    </style>
    
</head>
<body>

    <div class="header">
        <h1>TC-Myaing</h1>
        <p>Page Header and Description</p>
    </div>

    <nav>
      <div class="logo">
        <div class="user-section">
            <img src="img/user-icon.png" alt="User Image" style="border-radius: 20%; width: 30px; height: 30px; background: #fff;">
            <span id="loggedInUser">User: </span>
            <button onclick="logout()">Logout</button>
        </div>
      </div>
      <div class="links">
        <p id="login"></p>
        <p id="signup"></p>
        <p id="about-us"></p>
        <p id="contact"></p>
        <strong id="mobile-menu-btn">Menu</strong>
      </div>
    </nav>
    <!-- Small Screen Navigation Bar -->
    <div class="mobile-menu">
      <p id="login"></p>
        <p id="signup"></p>
        <p id="about-us"></p>
        <p id="contact"></p>
    </div>

    <script>
    let login = "Login";
    let resultlogin = login.link("index.html");
    document.getElementById("login").innerHTML = resultlogin;

    let signup = "Signup";
    let resultsignup = signup.link("index.html");
    document.getElementById("signup").innerHTML = resultsignup;

    let about-us = "About Us";
    let resultabout = signup.link("index.html");
    document.getElementById("about-us").innerHTML = resultabout;

    let contact = "Contact";
    let resultcontact = contact.link("index.html");
    document.getElementById("contact").innerHTML = resultcontact;

    

    </script>
    
    <script>
      var mobileMenuBtn = document.querySelector("#mobile-menu-btn");
var mobileMenu = document.querySelector(".mobile-menu");

mobileMenuBtn.addEventListener("click", () => {
  if (mobileMenu.style.display === "none") {
    mobileMenu.style.display = "flex";
    mobileMenuBtn.innerHTML = "Close";
  } else {
    mobileMenu.style.display = "none";
    mobileMenuBtn.innerHTML = "Menu";
  }
});

    </script>
    
    
    <div class="container posts-section">
        <!-- JSON sample for posts -->
        <div class="post">
            <h2>Title 1</h2>
            <p>Date: 2024-01-28</p>
            <p>Description: This is the description for post 1.</p>
            <a href="#download-url">Download</a>
            <img src="img/img_avatar2.png" alt="Post Image 1" style="width:100%;">
        </div>
        <div class="post">
            <h2>Title 2</h2>
            <p>Date: 2024-01-29</p>
            <p>Description: This is the description for post 2.</p>
            <a href="#download-url">Download</a>
            <img src="img/img_avatar2.png" alt="Post Image 2" style="width:100%;">
        </div>
        <!-- Add more posts as needed -->
    </div>

    <div class="footer">
        <p>&copy; 2024 Your Website. All Rights Reserved.</p>
    </div>

  <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Retrieve the logged-in username from sessionStorage
            const loggedInUser = sessionStorage.getItem('loggedInUser');

            // Display the username in the user-info section
            const loggedInUserElement = document.getElementById('loggedInUser');
            if (loggedInUser) {
                loggedInUserElement.textContent = ` > ${loggedInUser}`;
            }
        });

        // For Logout
           function logout() {
            // Clear the sessionStorage and redirect to the login page
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Check if the user is logged in
        const isLoggedIn = sessionStorage.getItem('loggedIn');

        if (!isLoggedIn) {
            // If not logged in, redirect to the login page
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
