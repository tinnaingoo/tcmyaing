<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Preview</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #preview-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview-image {
            max-width: 100%;
            max-height: 100%;
            cursor: grab;
        }
    </style>
</head>
<body>
    <div id="preview-container">
        <img id="preview-image" src="" alt="Preview Image">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const queryParams = new URLSearchParams(window.location.search);
            const imageUrl = decodeURIComponent(queryParams.get('imageUrl'));
            const title = decodeURIComponent(queryParams.get('title'));
            const date = decodeURIComponent(queryParams.get('date'));
            const description = decodeURIComponent(queryParams.get('description'));
            const creator = decodeURIComponent(queryParams.get('creator'));
            const view = decodeURIComponent(queryParams.get('view'));

            // Set image details
            document.getElementById('preview-image').src = imageUrl;
            document.getElementById('preview-image').title = `${title}\nDate: ${date}\nDescription: ${description}\nCreator: ${creator}\nViews: ${view}`;

            // Make the image draggable
            let isDragging = false;
            let offsetX, offsetY;

            document.getElementById('preview-image').addEventListener('mousedown', (event) => {
                isDragging = true;
                offsetX = event.clientX - parseFloat(window.getComputedStyle(document.getElementById('preview-image')).left);
                offsetY = event.clientY - parseFloat(window.getComputedStyle(document.getElementById('preview-image')).top);
            });

            document.addEventListener('mousemove', (event) => {
                if (isDragging) {
                    const x = event.clientX - offsetX;
                    const y = event.clientY - offsetY;
                    document.getElementById('preview-image').style.left = `${x}px`;
                    document.getElementById('preview-image').style.top = `${y}px`;
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // Make the image zoomable
            let currentScale = 1;

            document.getElementById('preview-image').addEventListener('wheel', (event) => {
                event.preventDefault();
                currentScale += event.deltaY * -0.01;

                // Limit the zoom scale
                currentScale = Math.min(Math.max(0.2, currentScale), 5);

                document.getElementById('preview-image').style.transform = `scale(${currentScale})`;
            });
        });
    </script>
</body>
</html>
