<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
  <body>
    <style>
      * {
  padding: 0px;
  margin: 0px;
  transition: 0.5 s;
  font-family: Verdana, Geneva, Tahoma, sans-serif;
}
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0px 30px;
  background-color: #333;
  color: white;
  height: 8vh;
}
nav .links {
  display: flex;
}
.links p {
  padding: 10px;
}
#mobile-menu-btn {
  display: none;
}
.mobile-menu {
  color: white;
  display: none;
  position: absolute;
  right: 0;
  height: 60vh;
  width: 70vw;
  background-color: blue;
}

@media (max-width: 600px) {
  #mobile-menu-btn {
    display: block;
  }
  nav p {
    display: none;
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
  }
}

    </style>
    <!-- Large Screen Navigation Bar -->
    <nav>
      <div class="logo">
        <div class="user-section">
            <img src="img/user-icon.png" alt="User Image" style="border-radius: 20%; width: 30px; height: 30px; background: #fff;">            
          </div>
      </div>
      <div class="links">
        <p>Login</p>
        <p>Signup</p>
        <p>About Us</p>
        <p>Contact</p>
        <strong id="mobile-menu-btn">Menu</strong>
      </div>
    </nav>
    <!-- Small Screen Navigation Bar -->
    <div class="mobile-menu">
      <p>Login</p>
      <p>Signup</p>
      <p>About Us</p>
      <p>Contact</p>
    </div>

    <script>
      var mobileMenuBtn = document.querySelector("#mobile-menu-btn");
var mobileMenu = document.querySelector(".mobile-menu");

mobileMenuBtn.addEventListener("click", () => {
  if (mobileMenu.style.display === "none") {
    mobileMenu.style.display = "flex";
    mobileMenuBtn.innerHTML = "Close";
  } else {
    mobileMenu.style.display = "none";
    mobileMenuBtn.innerHTML = "Menu";
  }
});

    </script>
  </body>
</html>
