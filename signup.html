<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            max-width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            margin-bottom: 16px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 12px;
            background-color: #28a745; /* Green color for signup button */
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838; /* Darker green color on hover */
        }

        .success-message, .error-message {
            text-align: center;
            margin-top: 16px;
        }

        @media only screen and (max-width: 600px) {
            .container {
                width: 90%;
            }
        }
    </style>
    <title>Registration Form</title>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Registration</h2>
        <form>
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" required>
            <label for="user_name">User Name:</label>
            <input type="text" id="user_name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" required>
            <label for="fb_link">FB Link:</label>
            <input type="url" id="fb_link" required>
            <label for="password">Password :</label>
            <input type="password" id="password" required>
            <input type="checkbox" onclick="myFunction()">Show Password


            <button type="button" onclick="AddRow()">Register</button>
        </form>
        <p id="success-message" class="success-message"></p>
    </div>

    <script>
function myFunction() {
  var x = document.getElementById("myInput");
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
</script>

    <script>
        function AddRow() {
            var full_name = document.getElementById("full_name").value;
            var user_name = document.getElementByID("user_name").value;
            var email = document.getElementById("email").value;
            var phone = document.getElementById("phone").value;
            var fb_link = document.getElementByID("fb_link").value;
            var password = document.getElementByID("password").value;                                     

            if (full_name === ""||user_name === ""|| email === "" || phone === "" || fb_link === ""|| password === "") {
                displayErrorMessage("Please fill in all fields.");
            } else {
                google.script.run.AddRecord(full_name, user_name, email, phone, fb_link, password);
                displaySuccessMessage("You have successfully registered!");
                document.getElementById("full_name").value = "";
                document.getElementById("user_name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("fb_link").value = "";
                document.getElementById("password").value = "";
            }
        }

        function displaySuccessMessage(message) {
            var successMessage = document.getElementById("success-message");
            successMessage.textContent = message;
            successMessage.style.color = "#28a745"; // Green color for success message
        }

        function displayErrorMessage(message) {
            var errorMessage = document.getElementById("success-message");
            errorMessage.textContent = message;
            errorMessage.style.color = "#dc3545"; // Red color for error message
        }
    </script>
</body>
</html>
