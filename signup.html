<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      width: 80%;
      max-width: 400px;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #4caf50;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      text-align: left;
    }

    .checkbox-container input {
      margin-right: 8px;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #4caf50;
    }

    .error-message {
      margin-top: 16px;
      font-size: 14px;
      color: #f00;
    }

    p {
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<form id="signupForm">
  <label for="fullname">Full Name:</label>
  <input type="text" id="fullname" name="fullname" required>

  <label for="username">Username:</label>
  <input type="text" id="username" name="username" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" required>

  <label for="fb_link">Facebook Link:</label>
  <input type="text" id="fb_link" name="fb_link" required>

  <label for="password">Password:</label>
  <div class="password-container">
    <input type="password" id="password" name="password" required>
    <div class="checkbox-container">
      <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
      <label for="showPassword">Show Password</label>
    </div>
  </div>

  <button type="button" onclick="signup()">Sign Up</button>

  <div class="message" id="signupMessage"></div>
  <div class="error-message" id="errorMessage"></div>

  <p>Already have an account? <a href="index.html">Login</a></p>
</form>

<script>
  function signup() {
    const formData = {
      fullname: document.getElementById('fullname').value,
      username: document.getElementById('username').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      fb_link: document.getElementById('fb_link').value,
      password: document.getElementById('password').value,
    };

    // Check if username already exists
     // Check if the username already exists
        const existingUsernames = data.some(user => user.username === username);
    
    if (existingUsernames.includes(formData.username.toLowerCase())) {
      document.getElementById('errorMessage').innerText = 'Username is already taken. Please choose another.';
      document.getElementById('signupMessage').innerText = '';
      return;
    }

    // Perform validation here if needed

    // Send data to the API
    fetch('https://sheetdb.io/api/v1/0tgi3664owtat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(formData),
    })
    .then(response => response.json())
    .then(data => {
      console.log('Success:', data);
      // Handle success response
      document.getElementById('signupMessage').innerText = 'Signup successful!';
      document.getElementById('errorMessage').innerText = '';
      // Clear input fields
      document.getElementById('signupForm').reset();
    })
    .catch((error) => {
      console.error('Error:', error);
      // Handle error
      document.getElementById('signupMessage').innerText = '';
      document.getElementById('errorMessage').innerText = 'Signup failed. Please try again.';
    });
  }

  function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const showPasswordCheckbox = document.getElementById('showPassword');
    
    passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
  }
</script>

</body>
</html>
