<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            max-width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            margin-bottom: 16px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 12px;
            background-color: #28a745; /* Green color for signup button */
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838; /* Darker green color on hover */
        }

        .success-message, .error-message {
            text-align: center;
            margin-top: 16px;
        }

        @media only screen and (max-width: 600px) {
            .container {
                width: 90%;
            }
        }
    </style>
    <title>Signup Page</title>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Signup</h2>
        <form>
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" required>
            <label for="username">Username:</label>
            <input type="text" id="username" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" required>

            <button type="button" onclick="signup()">Signup</button>
        </form>
        <p id="success-message" class="success-message"></p>
        <p id="error-message" class="error-message"></p>
    </div>

    <script>
        async function signup() {
            var fullName = document.getElementById("fullName").value;
            var username = document.getElementById("username").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            var sheetDbUrl = 'https://sheetdb.io/api/v1/SHEETDB_API_ENDPOINT'; // Replace with your SheetDB API endpoint

            try {
                const response = await fetch(sheetDbUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ data: [{ fullName, username, email, password }] }),
                });

                const responseData = await response.json();

                if (responseData.status === 'OK') {
                    displaySuccessMessage('Signup successful!');
                    clearForm();
                } else {
                    displayErrorMessage('Failed to sign up. Please try again.');
                }
            } catch (error) {
                displayErrorMessage('An error occurred. Please try again later.');
            }
        }

        function displaySuccessMessage(message) {
            var successMessage = document.getElementById("success-message");
            var errorMessage = document.getElementById("error-message");
            successMessage.textContent = message;
            errorMessage.textContent = "";
        }

        function displayErrorMessage(message) {
            var errorMessage = document.getElementById("error-message");
            var successMessage = document.getElementById("success-message");
            errorMessage.textContent = message;
            errorMessage.style.color = "#dc3545"; // Red color for error message
            successMessage.textContent = "";
        }

        function clearForm() {
            document.getElementById("fullName").value = "";
            document.getElementById("username").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        }
    </script>
</body>
</html>
