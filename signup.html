<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            margin-bottom: 16px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: #28a745; /* Green color for signup button */
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838; /* Darker green color on hover */
        }

        .error-message {
            color: #dc3545; /* Red color for error messages */
            margin-top: 8px;
        }
    </style>
    <title>Signup Page</title>
</head>
<body>
    <div class="container">
        <h2>Signup</h2>
        <form id="signupForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" required>
            <label for="username">Username:</label>
            <input type="text" id="username" required>
            <label for="phoneNumber">Phone Number:</label>
            <input type="text" id="phoneNumber" required>
            <label for="facebookLink">Facebook Link:</label>
            <input type="text" id="facebookLink" required>
            <label for="password">Password (6-10 characters):</label>
            <input type="password" id="password" required>
            <button type="submit">Signup</button>
        </form>
        <p id="error" class="error-message"></p>
        <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const signupForm = document.getElementById('signupForm');

            signupForm.addEventListener('submit', async function (event) {
                event.preventDefault();

                const fullName = document.getElementById('fullName').value;
                const username = document.getElementById('username').value;
                const phoneNumber = document.getElementById('phoneNumber').value;
                const facebookLink = document.getElementById('facebookLink').value;
                const password = document.getElementById('password').value;

                // Password strength check
                if (!isStrongPassword(password)) {
                    displayErrorMessage('Password must be between 6 and 10 characters and contain at least one uppercase letter, one lowercase letter, and one digit.');
                    return;
                }

                // Fetch data from SheetDB
                const sheetDbUrl = 'https://sheetdb.io/api/v1/0tgi3664owtat'; // Replace with your SheetDB API endpoint
                const response = await fetch(sheetDbUrl);
                const data = await response.json();

                // Check if the username already exists
                const usernameExists = data.some(user => user.username === username);

                if (!usernameExists) {
                    // Add the new user to the sheet
                    const newUser = {
                        full_name: fullName,
                        username: username,
                        phone_number: phoneNumber,
                        facebook_account_link: facebookLink,
                        password: password
                    };

                    try {
                        const postData = await fetch(sheetDbUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ data: [newUser] }),
                        });

                        const responseData = await postData.json();

                        if (responseData.status === 'OK') {
                            showToast('Signup successful! Redirecting to Login...');
                            // Redirect to login page after a brief delay
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 3000);
                            return;
                        }
                    } catch (error) {
                        // Log the error to the console for debugging
                        console.error(error);
                    }
                }

                displayErrorMessage('Failed to sign up. Username already taken. Please try a different one.');
            });

            function isStrongPassword(password) {
                // Password must be between 6 and 10 characters and contain at least one uppercase letter, one lowercase letter, and one digit
                const regex = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,10}$/;
                return regex.test(password);
            }

            function showToast(message) {
                Toastify({
                    text: message,
                    duration: 3000,
                    newWindow: true,
                    close: true,
                    gravity: 'bottom',
                    position: 'right',
                    backgroundColor: '#28a745', /* Green color for toast message */
                    stopOnFocus: true,
                }).showToast();
            }

            function displayErrorMessage(message) {
                const errorElement = document.getElementById('error');
                errorElement.textContent = message;
            }
        });
    </script>
</body>
</html>
