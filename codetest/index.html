<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Manipulation</title>
</head>
<body>

    <div id="output"></div>

    <script>
        // Your original JSON object
        var originalJson = {
            "originalKey": "originalValue1,originalValue2,originalValue3",
            "anotherKey": "anotherValue"
        };

        // Split the comma-separated values into an array
        var valuesArray = originalJson.originalKey.split(',');

        // Display each value separately on the webpage
        valuesArray.forEach(function(value, index) {
            document.getElementById("output").innerHTML += "Value " + (index + 1) + ": " + value + "<br>";
        });
    </script>

</body>
</html>
