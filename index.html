<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #f5f5f5;
}

.container {
    max-width: 400px;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

form {
    border: 3px solid #f1f1f1;
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
}

input[type=text], input[type=password] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  box-sizing: border-box;
}


button {
  background-color: #04AA6D;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 70%;
}


button:hover {
  opacity: 0.8;
}

.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
}

img.avatar {
  width: 40%;
  border-radius: 50%;
}

.error-message {
    color: #FF0000;
    margin-top: 8px;
}

    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <title>Login Page</title>
</head>
<body>

    <div class="container">
        <h2>Login</h2>

	<div class="imgcontainer">
    	<img src="img/img_avatar2.png" alt="Avatar" class="avatar">
  	</div>

        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" required autocomplete="username">
            <label for="password">Password:</label>
            <input type="password" id="password" required>
	    <label>
      	    <input type="checkbox" checked="checked" name="remember"> Show Password </label>
            <button type="submit">Login</button>
        </form>
        <p id="error" class="error-message"></p>
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Fetch data from SheetDB
        const sheetDbUrl = 'https://sheetdb.io/api/v1/0tgi3664owtat';
        const response = await fetch(sheetDbUrl);
        const data = await response.json();

        // Check if the username and password match
        const user = data.find(u => u.username === username && u.password === password);

        if (user) {
            sessionStorage.setItem('loggedInUser', username);
            showToast('Login successful! Redirecting to File Share...');
            // Redirect to fileshare.html after a brief delay
            setTimeout(() => {
                window.location.href = 'fileshare.html';
            }, 3000);
        } else {
            displayErrorMessage('Invalid username or password. Please try again.');
        }
    });

    function showToast(message) {
        Toastify({
            text: message,
            duration: 3000,
            newWindow: true,
            close: true,
            gravity: 'bottom',
            position: 'right',
            backgroundColor: '#007BFF',
            stopOnFocus: true,
        }).showToast();
    }

    function displayErrorMessage(message) {
        const errorElement = document.getElementById('error');
        errorElement.textContent = message;
    }
});

        
    </script>
</body>
</html>
