<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            margin-bottom: 16px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: #FF0000;
            margin-top: 8px;
        }
    </style>
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" required autocomplete="username">
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <button type="submit">Login</button>
        </form>
        <p id="error" class="error-message"></p>
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if a user is already logged in
            const loggedInUser = sessionStorage.getItem('loggedInUser');

            // If a user is logged in, redirect to fileshare.html
            if (loggedInUser) {
                window.location.href = 'fileshare.html';
            }
        });

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Fetch data from SheetDB
            const sheetDbUrl = 'https://sheetdb.io/api/v1/0tgi3664owtat'; // Replace with your SheetDB API endpoint
            const response = await fetch(sheetDbUrl);
            const data = await response.json();

            // Check if the provided username and password match any row in the sheet
            const userExists = data.some(user => user.username === username && user.password === password);

            if (userExists) {
                // Save the username to sessionStorage
                sessionStorage.setItem('loggedInUser', username);
                showToast('Login successful!');
                // Redirect to fileshare.html
                window.location.href = 'fileshare.html';
            } else {
                // Display an error message
                const errorElement = document.getElementById('error');
                errorElement.textContent = 'Invalid username or password. Please try again.';
            }
        });

        function showToast(message) {
            Toastify({
                text: message,
                duration: 3000,
                newWindow: true,
                close: true,
                gravity: 'bottom', // Available options: 'top', 'bottom', 'center', 'left', 'right'
                position: 'right', // Available options: 'left', 'right', 'center'
                backgroundColor: '#007BFF',
                stopOnFocus: true,
            }).showToast();
        }
    </script>
</body>
</html>
