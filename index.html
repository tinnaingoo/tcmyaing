<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
       body{
          margin: 0px;
          font-family: 'Open Sans', sans-serif;
          background-image: url(https://umad.com/img/2015/1/dark-geometric-wallpaper-176-205-hd-wallpapers.jpg);
    }

.login-page {
  width: 450px;
  padding: 8% 0 0;
  margin: auto;
}        
        
.container {
    padding: 16px;
}

form {
  position: relative;
  z-index: 1;
  background: #FFFFFF;
  max-width: 100%;
  margin: 0 auto 100px;
  padding: 45px;
  }
        
.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
}

img.avatar {
  width: 40%;
  border-radius: 50%;
}
        
label {
    margin-bottom: 8px;
}

input {
      input[type=text], input[type=password] {
      width: 100%;
      padding: 12px 20px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      box-sizing: border-box;
}
}

button {
    padding: 10px;
    background-color: #007BFF;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    width:100%;
}

button:hover {
    background-color: #0056b3;
}


.error-message {
    color: #FF0000;
    margin-top: 8px;
    text-align: center;
    font-size: 10px;
}

    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <title>Login Page</title>
</head>
<body>
    <div class="login-page">
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="imgcontainer">
                <img src="img_avatar2.png" alt="Avatar" class="avatar">
            </div>
            <label for="username">Username</label></br>
            <input type="text" id="username" placeholder="Enter Username" required autocomplete="username"></br>
            <label for="password">Password</label></br>
            <input type="password" id="password" placeholder="Enter Password" required></br>
            <button type="submit">Login</button></br>
            <p id="error" class="error-message"></p></br>
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
    </div>
    </div>       
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Fetch data from SheetDB
        const sheetDbUrl = 'https://sheetdb.io/api/v1/0tgi3664owtat';
        const response = await fetch(sheetDbUrl);
        const data = await response.json();

        // Check if the username and password match
        const user = data.find(u => u.username === username && u.password === password);

        if (user) {
            sessionStorage.setItem('loggedInUser', username);
            showToast('Login successful! Redirecting to File Share...');
            // Redirect to fileshare.html after a brief delay
            setTimeout(() => {
                window.location.href = 'fileshare.html';
            }, 3000);
        } else {
            displayErrorMessage('Invalid username or password. Please try again.');
        }
    });

    function showToast(message) {
        Toastify({
            text: message,
            duration: 3000,
            newWindow: true,
            close: true,
            gravity: 'bottom',
            position: 'right',
            backgroundColor: '#007BFF',
            stopOnFocus: true,
        }).showToast();
    }

    function displayErrorMessage(message) {
        const errorElement = document.getElementById('error');
        errorElement.textContent = message;
    }
});

        
    </script>
</body>
</html>
