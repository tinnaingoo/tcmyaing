<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #f5f5f5;
}

.container {
    max-width: 400px;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

form {
  position: relative;
  z-index: 1;
  background: #FFFFFF;
  max-width: 360px;
  margin: 0 auto 100px;
  padding: 45px;
  text-align: center;
  box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.2), 0 5px 5px 0 rgba(0, 0, 0, 0.24);
}

label {
    margin-bottom: 8px;
}

input {
    margin-bottom: 16px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button {
    padding: 10px;
    background-color: #007BFF;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

.error-message {
    color: #FF0000;
    margin-top: 8px;
}

    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" required autocomplete="username">
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <button type="submit">Login</button>
        </form>
        <p id="error" class="error-message"></p>
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Fetch data from SheetDB
        const sheetDbUrl = 'https://sheetdb.io/api/v1/0tgi3664owtat';
        const response = await fetch(sheetDbUrl);
        const data = await response.json();

        // Check if the username and password match
        const user = data.find(u => u.username === username && u.password === password);

        if (user) {
            sessionStorage.setItem('loggedInUser', username);
            showToast('Login successful! Redirecting to File Share...');
            // Redirect to fileshare.html after a brief delay
            setTimeout(() => {
                window.location.href = 'fileshare.html';
            }, 3000);
        } else {
            displayErrorMessage('Invalid username or password. Please try again.');
        }
    });

    function showToast(message) {
        Toastify({
            text: message,
            duration: 3000,
            newWindow: true,
            close: true,
            gravity: 'bottom',
            position: 'right',
            backgroundColor: '#007BFF',
            stopOnFocus: true,
        }).showToast();
    }

    function displayErrorMessage(message) {
        const errorElement = document.getElementById('error');
        errorElement.textContent = message;
    }
});

        
    </script>
</body>
</html>
