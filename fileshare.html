<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>File Share Page</title>
</head>
<body>
    <div class="container">
        <h2>Welcome to the File Share Page!</h2>
        <p id="loggedInUser"></p>
        <!-- Add your content here -->
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
    // Retrieve the logged-in username from sessionStorage
    const loggedInUser = sessionStorage.getItem('loggedInUser');

    // Display the username on the page
    const loggedInUserElement = document.getElementById('loggedInUser');
    if (loggedInUser) {
        loggedInUserElement.textContent = `Logged in as: ${loggedInUser}`;
    } else {
        // Redirect to the login page if the username is not found in sessionStorage
        window.location.href = 'index.html';
    }
});
    </script>
</body>
</html>
