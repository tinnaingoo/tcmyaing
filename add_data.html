<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Data to SheetDB</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f7f7f7;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            color: #555;
        }

        input, textarea {
            margin-bottom: 12px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: #008000;
        }

        .error {
            color: #FF0000;
        }
    </style>
</head>
<body>

    <h1>Add Data to SheetDB</h1>

    <form id="dataForm">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea><br>

        <label for="downloadLink">Download Link:</label>
        <input type="url" id="downloadLink" name="downloadLink" required><br>

        <label for="imageUrl">Image URL:</label>
        <input type="url" id="imageUrl" name="imageUrl" required><br>

        <label for="creator">Creator:</label>
        <input type="text" id="creator" name="creator" required><br>

        <button type="button" onclick="addData()">Add Data</button>
    </form>

    <div id="statusMessage"></div>

    <script>
        function addData() {
    // Get form input values
    var title = document.getElementById("title").value;
    var date = document.getElementById("date").value;
    var description = document.getElementById("description").value;
    var downloadLink = document.getElementById("downloadLink").value;
    var imageUrl = document.getElementById("imageUrl").value;
    var creator = document.getElementById("creator").value;

    // Define SheetDB API endpoint
    var apiEndpoint = 'https://sheetdb.io/api/v1/g3s2wf98urngi';

    // Construct data object
    var newData = {
        data: [{
            title: title,
            date: date,
            description: description,
            downloadLink: downloadLink,
            imageUrl: imageUrl,
            creator: creator
        }]
    };

    // Disable the button during the API request
    var addButton = document.getElementById("addButton");
    addButton.disabled = true;

    // Send POST request to SheetDB
    fetch(apiEndpoint, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(newData),
    })
    .then(response => response.json())
    .then(data => {
        // Check if the data addition was successful
        if (data.status === 'OK') {
            // Display success message
            displayStatusMessage('Data added successfully!', 'success');
        } else {
            // Display error message for other statuses
            displayStatusMessage('Failed to add data. Please try again.', 'error');
        }
    })
    .catch(() => {
        // Display error message for network or server errors
        displayStatusMessage('Error communicating with the server. Please try again later.', 'error');
    })
    .finally(() => {
        // Re-enable the button after the API request is complete
        addButton.disabled = false;
    });
}
        function displayStatusMessage(message, type) {
            var statusMessage = document.getElementById("statusMessage");
            statusMessage.textContent = message;

            if (type === 'success') {
                statusMessage.className = 'success';
            } else if (type === 'error') {
                statusMessage.className = 'error';
            }
        }
    </script>

</body>
</html>
