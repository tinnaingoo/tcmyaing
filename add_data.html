<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Data to SheetDB</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f7f7f7;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            color: #555;
        }

        input, textarea {
            margin-bottom: 12px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: #008000;
        }

        .error {
            color: #FF0000;
        }
    </style>
</head>
<body>

    <h1 style="color: #333;">Add Data to SheetDB</h1>

    <form id="dataForm">
        <label for="title" style="color: #555;">Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="date" style="color: #555;">Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="description" style="color: #555;">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <label for="downloadLink" style="color: #555;">Download Link:</label>
        <input type="url" id="downloadLink" name="downloadLink" required>

        <label for="imageUrl" style="color: #555;">Image URL:</label>
        <input type="url" id="imageUrl" name="imageUrl" required>

        <button type="button" onclick="addData()">Add Data</button>
    </form>

    <div id="statusMessage"></div>

    <script>
        function addData() {
            var title = document.getElementById("title").value;
            var date = document.getElementById("date").value;
            var description = document.getElementById("description").value;
            var downloadLink = document.getElementById("downloadLink").value;
            var imageUrl = document.getElementById("imageUrl").value;

            var apiEndpoint = 'https://sheetdb.io/api/v1/g3s2wf98urngi';

            var newData = {
                data: [{
                    title: title,
                    date: date,
                    description: description,
                    downloadLink: downloadLink,
                    imageUrl: imageUrl
                }]
            };

            fetch(apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(newData),
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'OK') {
                    displayStatusMessage('Data added successfully!', 'success');
                } else {
                    displayStatusMessage('Failed to add data. Please try again.', 'error');
                }
            })
            .catch(() => {
                displayStatusMessage('Error communicating with the server. Please try again later.', 'error');
            });
        }

        function displayStatusMessage(message, type) {
            var statusMessage = document.getElementById("statusMessage");
            statusMessage.textContent = message;

            if (type === 'success') {
                statusMessage.className = 'success';
            } else if (type === 'error') {
                statusMessage.className = 'error';
            }
        }
    </script>

</body>
</html>
