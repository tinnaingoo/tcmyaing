<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Data to SheetDB</title>
    <style>
        /* Your styling goes here */
    </style>
</head>
<body>

    <h1>Add Data to SheetDB</h1>

    <form id="dataForm">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea><br>

        <label for="downloadLink">Download Link:</label>
        <input type="url" id="downloadLink" name="downloadLink" required><br>

        <label for="imageUrl">Image URL:</label>
        <input type="url" id="imageUrl" name="imageUrl" required><br>

        <button type="button" onclick="addData()">Add Data</button>
    </form>

    <div id="statusMessage"></div>

    <script>
        function addData() {
            var title = document.getElementById("title").value;
            var date = document.getElementById("date").value;
            var description = document.getElementById("description").value;
            var downloadLink = document.getElementById("downloadLink").value;
            var imageUrl = document.getElementById("imageUrl").value;

            var apiEndpoint = 'https://sheetdb.io/api/v1/g3s2wf98urngi';

            var newData = {
                data: [{
                    title: title,
                    date: date,
                    description: description,
                    downloadLink: downloadLink,
                    imageUrl: imageUrl
                }]
            };

            fetch(apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(newData),
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'OK') {
                    displayStatusMessage('Data added successfully!', 'success');
                } else {
                    displayStatusMessage('Failed to add data. Please try again.', 'error');
                }
            })
            .catch(() => {
                displayStatusMessage('Error communicating with the server. Please try again later.', 'error');
            });
        }

        function displayStatusMessage(message, type) {
            var statusMessage = document.getElementById("statusMessage");
            statusMessage.textContent = message;

            if (type === 'success') {
                statusMessage.className = 'success';
            } else if (type === 'error') {
                statusMessage.className = 'error';
            }
        }
    </script>

</body>
</html>
